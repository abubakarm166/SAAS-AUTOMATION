# Redis for Celery job queue — install on Linux EC2 (same host as API).
#
# Ubuntu:
#   sudo apt install redis-server
#   sudo cp infra/redis-snapshot.conf /etc/redis/snapshot-queue.conf
#   sudo systemctl enable redis-server
#
# Or append to /etc/redis/redis.conf:
#   bind 0.0.0.0
#   requirepass YOUR_REDIS_PASSWORD
#   maxmemory 256mb
#   maxmemory-policy allkeys-lru
#
# Security group: allow TCP 6379 from Windows EC2 private IP only.

bind 0.0.0.0
protected-mode yes
port 6379
timeout 0
tcp-keepalive 300

# Set a strong password before exposing to the VPC:
# requirepass change-me-redis-password

maxmemory 256mb
maxmemory-policy allkeys-lru
